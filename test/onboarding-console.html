<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Onboarding Test Console</title>
    <style>
      :root {
        --bg: #f5f2ea;
        --panel: #fffdf8;
        --ink: #201d18;
        --muted: #6e6559;
        --line: #d8d0c2;
        --accent: #0f766e;
        --warn: #b45309;
        --bad: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.08), transparent 28%),
          linear-gradient(180deg, #faf8f2, var(--bg));
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 20px 72px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }
      p {
        color: var(--muted);
        line-height: 1.6;
      }
      .toolbar, .grid, .events {
        margin-top: 24px;
      }
      .toolbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: end;
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 280px;
        font-size: 0.95rem;
      }
      input {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: white;
        font: inherit;
      }
      button {
        padding: 12px 16px;
        border: 0;
        border-radius: 12px;
        background: var(--accent);
        color: white;
        font: inherit;
        cursor: pointer;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 12px 32px rgba(32, 29, 24, 0.05);
      }
      .card h2 {
        margin: 0 0 14px;
        font-size: 1rem;
      }
      dl {
        margin: 0;
        display: grid;
        grid-template-columns: minmax(120px, 1fr) 2fr;
        gap: 10px 12px;
      }
      dt {
        color: var(--muted);
      }
      dd {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.95rem;
        word-break: break-word;
      }
      .status-pill {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.86rem;
        font-weight: 600;
      }
      .healthy { background: rgba(15,118,110,0.12); color: var(--accent); }
      .pending { background: rgba(180,83,9,0.12); color: var(--warn); }
      .abnormal { background: rgba(185,28,28,0.12); color: var(--bad); }
      .completed { background: rgba(107,114,128,0.12); color: #4b5563; }
      .events table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
      }
      .events th, .events td {
        text-align: left;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        font-size: 0.95rem;
      }
      .events th {
        color: var(--muted);
        font-weight: 600;
      }
      .muted { color: var(--muted); }
      .error {
        margin-top: 16px;
        color: var(--bad);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Onboarding Test Console</h1>
      <p>输入 <code>open_claw_id</code>，查看当前链路状态、最近事件和是否符合测试期预期。</p>

      <div class="toolbar">
        <label>
          Open Claw ID
          <input id="openClawId" placeholder="例如 oc_123" />
        </label>
        <button id="load">查询</button>
      </div>

      <div id="error" class="error" hidden></div>

      <section class="grid" id="cards" hidden>
        <article class="card">
          <h2>当前判断</h2>
          <p><span id="expectationStatus" class="status-pill"></span></p>
          <p id="expectationMessage"></p>
          <p class="muted" id="nextAction"></p>
        </article>

        <article class="card">
          <h2>服务快照</h2>
          <dl id="snapshotMain"></dl>
        </article>

        <article class="card">
          <h2>认证与凭证</h2>
          <dl id="snapshotAuth"></dl>
        </article>
      </section>

      <section class="events" id="eventsSection" hidden>
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>动作</th>
              <th>结果</th>
              <th>错误码</th>
            </tr>
          </thead>
          <tbody id="eventsBody"></tbody>
        </table>
      </section>
    </main>

    <script>
      const input = document.getElementById("openClawId");
      const loadBtn = document.getElementById("load");
      const errorEl = document.getElementById("error");
      const cards = document.getElementById("cards");
      const eventsSection = document.getElementById("eventsSection");

      function renderDl(el, rows) {
        el.innerHTML = rows.map(([k, v]) => `<dt>${k}</dt><dd>${v ?? "-"}</dd>`).join("");
      }

      async function load() {
        const openClawId = input.value.trim();
        if (!openClawId) {
          errorEl.hidden = false;
          errorEl.textContent = "请输入 open_claw_id";
          cards.hidden = true;
          eventsSection.hidden = true;
          return;
        }
        errorEl.hidden = true;
        const resp = await fetch(`/api/open-claw/debug-console?open_claw_id=${encodeURIComponent(openClawId)}`);
        const payload = await resp.json();
        if (!resp.ok || !payload.success) {
          errorEl.hidden = false;
          errorEl.textContent = payload?.error?.message ?? "查询失败";
          cards.hidden = true;
          eventsSection.hidden = true;
          return;
        }

        const { snapshot, expectation, recent_events } = payload.data;
        cards.hidden = false;
        eventsSection.hidden = false;

        const statusEl = document.getElementById("expectationStatus");
        statusEl.textContent = expectation.status;
        statusEl.className = `status-pill ${expectation.status}`;
        document.getElementById("expectationMessage").textContent = expectation.message;
        document.getElementById("nextAction").textContent = `建议：${expectation.next_action}`;

        renderDl(document.getElementById("snapshotMain"), [
          ["open_claw_id", snapshot.open_claw_id],
          ["user_id", snapshot.user_id],
          ["service_active", String(snapshot.service_active)],
          ["onboarding_day", snapshot.onboarding_day],
          ["adoption_state", snapshot.adoption_state],
          ["dominant_scene", snapshot.dominant_scene],
          ["expires_at", snapshot.expires_at],
        ]);

        renderDl(document.getElementById("snapshotAuth"), [
          ["host_id", snapshot.host_id],
          ["host_registered", String(snapshot.host_registered)],
          ["host_access_token", snapshot.host_access_token_preview],
          ["onboarding_token", snapshot.onboarding_token_preview],
          ["redeemed", String(snapshot.redeemed)],
          ["redeem_id", snapshot.redeem_id],
          ["activated_at", snapshot.activated_at],
        ]);

        const eventsBody = document.getElementById("eventsBody");
        eventsBody.innerHTML = recent_events.length
          ? recent_events.map((event) => `
              <tr>
                <td>${event.timestamp ?? "-"}</td>
                <td>${event.action ?? event.type ?? "-"}</td>
                <td>${event.outcome ?? "-"}</td>
                <td>${event.errorCode ?? "-"}</td>
              </tr>
            `).join("")
          : `<tr><td colspan="4" class="muted">暂无事件</td></tr>`;
      }

      loadBtn.addEventListener("click", load);
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          load();
        }
      });

      const fromQuery = new URL(location.href).searchParams.get("open_claw_id");
      if (fromQuery) {
        input.value = fromQuery;
        load();
      }
    </script>
  </body>
</html>
